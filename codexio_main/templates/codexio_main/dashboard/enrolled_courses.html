{% extends "base.html" %}

{% block content %}

<style>
    .courses-container{

padding:40px;

}

.course-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;

}

.course-card{

background:#1e1e2f;
padding:20px;
border-radius:10px;
text-decoration:none;
color:white;
transition:0.3s;

}

.course-card:hover{

transform:translateY(-5px);
background:#2b2b45;

}

.course-card h3{

margin-bottom:10px;
color:#4da3ff;

}
</style>
<div class="courses-container">

<h2>My Courses</h2>

<div class="course-grid">

{% for enrollment in enrollments %}

<a href="{% url 'course_detail' enrollment.course.id %}" class="course-card">

<h3>{{ enrollment.course.topic }}</h3>

<p>{{ enrollment.course.description|truncatewords:20 }}</p>

</a>

{% empty %}

<p>You are not enrolled in any course yet.</p>

{% endfor %}

</div>

</div>

{% endblock %}
