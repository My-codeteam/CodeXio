{% extends "base.html" %}

{% block content %}
<style>
.review-section{
    background:#f4f8ff;
    padding:70px 20px;
}

.review-card{
    max-width:700px;
    margin:auto;
    background:#fff;
    border-radius:18px;
    padding:40px;
    box-shadow:
    0 15px 40px rgba(0,0,0,.08);
}

.review-header{
    text-align:center;
    margin-bottom:35px;
}

.review-header h2{
    color:#1434A4;
    font-size:32px;
    margin-bottom:12px;

}

.review-header p{
    color:#666;
    font-size:16px;
    line-height:1.7;

}

.review-header span{
    color:#2563eb;
    font-weight:bold;
}

/* Labels */

label{
    display:block;
    font-weight:600;
    margin-bottom:8px;
    color:#333;
}

/* Inputs */

input,
textarea,
select{
    width:100%;
    padding:14px 16px;
    border:1px solid #d6dce8;
    border-radius:10px;
    font-size:15px;
    margin-bottom:22px;
    transition:.3s;
    outline:none;
    background:#fafcff;
    box-sizing:border-box;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#2563eb;
    box-shadow:
    0 0 0 4px rgba(37,99,235,.15);
    background:#fff;
}

/* Textarea */

textarea{
    resize:vertical;
    min-height:170px;
}

/* Select */

select{
    cursor:pointer;
}

/* Button */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(
        135deg,
        #2563eb,
        #1434A4
    );
    color:#fff;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.35s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:
    0 12px 25px rgba(37,99,235,.30);
}

button:active{
    transform:scale(.98);
}

/* Optional helper */

small{
    color:#777;
    font-weight:400;
}

/* Mobile */

@media(max-width:768px){

    .review-card{
        padding:25px;
    }

    .review-header h2{
        font-size:27px;
    }

}
/* Style for info message */
.info-box {
  background: #262626;
  color: #ff6666;
  border: 1px solid #b30000;
  padding: 0.8em;
  margin-top: 1em;
  border-radius: 0.5em;
  text-align: center;
  font-size: 0.9em;
}

.message-container{
  width:100%;
  max-width:400px;
  margin:20px auto;
}

.alert{
  padding:14px;
  border-radius:8px;
  margin-bottom:12px;
  font-size:14px;
  font-weight:500;
  animation:fadeIn 0.4s ease;
}

.alert-success{
  background:#052e16;
  border:1px solid #22c55e;
  color:#86efac;
}

.alert-error{
  background:#450a0a;
  border:1px solid #ef4444;
  color:#fca5a5;
}

.alert-warning{
  background:#3b2f00;
  border:1px solid #facc15;
  color:#fde68a;
}

.alert-info{
  background:#172554;
  border:1px solid #3b82f6;
  color:#93c5fd;
}

</style>

<section class="review-section">
    {% if messages %}

    <div class="message-container">

    {% for message in messages %}

        <div class="alert
        {% if message.tags == 'success' %}
            alert-success
        {% elif message.tags == 'error' %}
            alert-error
        {% elif message.tags == 'warning' %}
            alert-warning
        {% else %}
            alert-info
        {% endif %}
        ">

           {{ message }}

        </div>

    {% endfor %}

    </div>

    {% endif %}


    <div class="review-card">

        <div class="review-header">
            <h2>Share Your Experience</h2>
            <p>
                Tell others what learning with <span>CodexMingle</span> has been like.
            </p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <label>Full Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required
            >

            <label>Email <small>(Optional)</small></label>
            <input
                type="email"
                name="email"
                placeholder="you@example.com"
            >

            <label>Country</label>
            <input
                type="text"
                name="country"
                placeholder="Nigeria"
                required
            >

            <label>Rating</label>

            <select name="rating">

                <option value="5">★★★★★ Excellent</option>
                <option value="4">★★★★☆ Very Good</option>
                <option value="3">★★★☆☆ Good</option>
                <option value="2">★★☆☆☆ Fair</option>
                <option value="1">★☆☆☆☆ Poor</option>

            </select>

            <label>Your Review</label>

            <textarea
                name="comment"
                rows="6"
                placeholder="Tell us about your learning journey..."
                required
            ></textarea>

            <button type="submit">

                Submit Review

            </button>

        </form>

    </div>

</section>

{% endblock %}
