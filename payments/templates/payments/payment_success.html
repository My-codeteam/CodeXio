{% extends "base.html" %}
{% block content %}

<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(34, 197, 94, 0.25);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 25px rgba(34, 197, 94, 0.15);
        }

        .icon {
            font-size: 60px;
            color: #22c55e;
            margin-bottom: 15px;
        }

        h1 {
            margin: 10px 0;
            font-size: 26px;
            color: #f8fafc;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .success-box {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            color: #86efac;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .dashboard {
            background: #38bdf8;
            color: #0f172a;
        }

        .dashboard:hover {
            background: #0ea5e9;
        }

        .home {
            background: transparent;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        .home:hover {
            background: rgba(56, 189, 248, 0.1);
        }
    </style>
</head>

<body>

<div class="container">

    <div class="icon">✔️</div>

    <h1>Payment Successful</h1>

    <p>Your payment has been verified successfully. You now have access to your course.</p>

    <div class="success-box">
        Welcome to CodexMingle Learning Platform 🚀
    </div>

    <a href="/student_portal" class="btn dashboard">Go to Dashboard</a>

    <a href="/" class="btn home">Back to Home</a>

</div>

{% endblock %}
